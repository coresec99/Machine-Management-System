services:
  - type: web
    name: mms-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mms-postgres-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-netlify-app-url.netlify.app # IMPORTANT: Update this in the Render dashboard

databases:
  - name: mms-postgres-db
    databaseName: mms_db
    user: mms_user
